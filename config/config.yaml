# Core inputs
# Docker実行時に作業ディレクトリ外を使う場合は、/host_data/... を指定
# (host側は SATDL_HOST_DATA_PATH で任意パスをマウント)
geojson: ./config/no5.geojson
startday: [20260425]
endday:   [20260425]
# 複数期間を順番に実行したい場合は配列で指定（startday/enddayは同じ要素数）

# Select one or multiple: sentinel2, landsat89, modis, viirs
# FIRMS active fire targets are recommended to be set in firms.activefire_satellite
satellite:
  - sentinel2

# Output root directory
# 出力は各衛星ごとに以下を作成:
# output/<satellite>/img         (生データ, シーン単位)
# output/<satellite>/masked      (同日コンポジット)
# output/<satellite>/snowmasked  (同日コンポジット)
# output/<satellite>/cloudmask   (同日コンポジット)
output: ./output

# Band selection
# band: all
# band: at
# num: [1, 2, 3]
band: all
num: []

# Cloud classes to mask: 1=thick cloud, 2=thin cloud, 3=shadow
cloudmask: [1, 3]

# Optional STAC filter
max_cloud_cover: 80
file_exists: skip # overwrite or skip

# GEE compatibility options (Sentinel-2)
# - output_crs: Match Get_Sentinel2.py export CRS
# - aoi_as_bbox: Use AOI envelope like ee.Geometry.Rectangle export region
# - snap_grid: Snap output grid to pixel-size aligned coordinates
gee_compatible:
  enabled: true
  output_crs: EPSG:32652
  aoi_as_bbox: true
  snap_grid: true

# Cloud mask inference options
omnicloudmask:
  batch_size: 1
  patch_size: 1000
  patch_overlap: 300
  device: cuda

# Snow mask options
snowmask:
  enabled: true
  ndsi_threshold: 0.4
  red_threshold: 0.2

# Metadata GeoJSON options
# 例: 20240201-20240415.geojson
metadata:
  enabled: true

# FIRMS API settings
firms:
  # active fire の取得対象（modis / viirs を任意に選択）
  activefire_satellite:
    - viirs
    - modis
  # APIキーは key.env から読み込む（推奨）
  # 例: FIRMS_API_KEY=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  key_env_path: ./key.env
  api_key: ""
  base_url: "https://firms.modaps.eosdis.nasa.gov/api/area/csv"
  # true の場合、取得結果を最後にAOIポリゴンで切り抜く
  clip_to_aoi: false
  # FIRMS取得用のBBOXをAOIから上下左右に広げる距離[m]
  bbox_buffer_m: 5000
  # true の場合、active fire を Sentinel-2準拠グリッドのTIFでも出力
  pixel_tif: true
  # pixel_tif の解像度[m]（Sentinel-2に合わせる場合は10を推奨）
  pixel_resolution: 10
  # true の場合、検知フットプリントがグリッド外に出るときはTIF範囲を自動拡張
  pixel_expand_to_detections: true
  # FIRMS area API の day range は 1..5
  days: 5
  # true の場合、startday-endday 全期間の総まとめ Shapefile も1つ出力
  period_summary: true
  # 直近監視：NRT, 過去の解析：SP
  product_map:
    # MODIS_SP は Terra/Aqua を含む標準処理データ
    modis:
      - MODIS_NRT
    # VIIRS はセンサ別。SNPP + NOAA-20 を両方取得
    # NOAA-21 は現状 NRT 系のみ（必要なら VIIRS_NOAA21_NRT を追加）
    viirs:
      - VIIRS_SNPP_NRT
      - VIIRS_NOAA20_NRT
      - VIIRS_NOAA21_NRT
